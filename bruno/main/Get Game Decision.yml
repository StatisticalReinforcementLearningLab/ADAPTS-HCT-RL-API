info:
  name: Get Game Decision
  type: http
  seq: 5

http:
  method: POST
  url: "http://127.0.0.1:5055/api/v1/action"
  body:
    type: json
    data: |-
      {
        "decision_type": "dyad_game",
        "group_id": "{{group_id}}",
        "decision_idx": 1,
        "timestamp": "2026-01-01T08:00:00.000Z"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
